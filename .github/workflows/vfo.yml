name: Update ISD Service Management Fishing VietNam

on:
  push:
    branches:
      - vfo

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy isd_profile_management to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script_stop: true
        script: |
          # Clone if not exists, otherwise update
          if [ ! -d ~/addons-system/isd_profile_management ]; then
            git clone git@github.com:IntelliSync-data/isd_profile_management.git ~/addons-system/isd_profile_management
            cd ~/addons-system/isd_profile_management && git checkout vfo
          else
            cd ~/addons-system/isd_profile_management
            git fetch origin && git reset --hard origin/vfo
          fi
          
          # Apply branch-specific override files
          cp ~/addons-system/isd_profile_management/views/menu_items_override.xml.vfo \
             ~/addons-system/isd_profile_management/views/menu_items_override.xml
          cp ~/addons-system/isd_profile_management/__manifest__.py.vfo \
             ~/addons-system/isd_profile_management/__manifest__.py

          # Sync isd_profile_management directory with rsync (including deletions)
          sudo mkdir -p /opt/custom-addons/isd_profile_management
          sudo rsync -av --delete \
            --exclude='views/menu_items_override.xml.*' \
            --exclude='__manifest__.py.*' \
            ~/addons-system/isd_profile_management/ /opt/custom-addons/isd_profile_management/

    - name: Update isd_profile_management Module
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script: |
          echo "Updating apps list..."
          echo "env['ir.module.module'].update_list(); env.cr.commit()" | sudo -u odoo /opt/odoo-venv/bin/python /opt/odoo18/odoo-bin shell -c /etc/odoo/odoo.conf -d ${{ secrets.VFO_DB_NAME }} --no-http
          echo "Updating isd_profile_management module..."
          sudo -u odoo /opt/odoo-venv/bin/python /opt/odoo18/odoo-bin -c /etc/odoo/odoo.conf -d ${{ secrets.VFO_DB_NAME }} -u isd_profile_management --stop-after-init --no-http || \
            echo "Module not installed yet (now visible in Apps list), continuing..."

    - name: Restart Odoo Service
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script: |
          sudo systemctl restart odoo

    - name: Verify Odoo Service
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script: |
          sleep 5
          if sudo systemctl is-active --quiet odoo; then
            echo "Odoo restarted successfully"
          else
            echo "Odoo failed to restart"
            echo "=== systemctl status ==="
            sudo systemctl status odoo --no-pager
            echo "=== Last 50 lines of Odoo log ==="
            sudo tail -n 50 /var/log/odoo/odoo.log
            exit 1
          fi